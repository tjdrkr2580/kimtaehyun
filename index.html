<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimTaeHyun</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <script src="https://kit.fontawesome.com/03ededf5ff.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/typeit@8.6.4/dist/index.umd.js"></script>
</head>
<body>
    <canvas id="starfield" width="3000" height="2000"></canvas>
    <img class="fixed-barcode" src="./assets/barcode.png" alt="Kim Tae Hyun Barcode">
    <div class="cursor"></div>
    <nav class="top-nav">
        <div class="left-flex">
            <h1 title="메인으로 이동하기">KimTaeHyun</h1>
        </div>
        <div class="right-flex">
            <i title="전체화면" class="fa-solid fa-down-left-and-up-right-to-center"></i>
        </div>
    </nav>
    <section class="greeting-container">
        <div class="texts-box">
            <p id="type"></p>
        </div>
    </section>
    <section class="profile-container">
        <div class="profile-box">
            <h1>Kim Tae Hyun</h1>
            <img class="profile-picture" src="./assets/KakaoTalk_20220523_150627335.png" alt="KimTaeHyun-picture">
        </div>
        <div class="text-box">
            <h1>"안녕하세요, 프론드엔드 개발자를 목표하는 김태현입니다."</h1>
            
            <div class="text-box-sec1">
                <p>늘 새로운 경험을 감사히 여기고 피하지 않아야만,<br>계속해서 큰 성장을 할 수 있을 것이라고 생각하고 있습니다.</p>
            </div>
           
            <p></p>
        </div>
    </section>
    <footer class="footer">
        <p class>© 2022-present KimTaeHyun. All Rights Reserved.</p>
        <div class="footer-icons">
            <a href="http://github.com/tjdrkr2580" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github"></i></a>
            <a href="http://instargram.com/only04_" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i></a>
            <a href="http://velog.io/@tjdrkr2580" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-v"></i></a>
            <a class="notionIcon" href="https://scented-pie-df2.notion.site/Kim-Tae-Hyun-4ce30c75290f450da94a7ac7590e8c78" target="_blank">N</a>
        </div>
    </footer>
    <script src="./js/animation.js"></script>
    <script src="./js/app.js"></script>
    <script>
        new TypeIt("#type", {
            speed: 40,
            strings: ["모두가 놀랄만한 웹사이트를 만들 것 입니다.",
            "모두가 사용하고 싶어하는 웹사이트를 만들 것 입니다.",
            "모두가 프론드엔드 개발자 김태현을 알 수 있게 만들고 싶습니다.","<br>",
            "저는 늘 성장을 갈망하는 고등학생, 김태현입니다."]
          }).go();
    </script>
</body>
</html>
